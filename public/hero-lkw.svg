<?xml version="1.0" encoding="UTF-8"?>
<!--
  Platzhalter fuer das Hero-Foto.
  Zum Austauschen: diese Datei durch ein echtes Foto ersetzen
  (z. B. public/hero-lkw.jpg) und in components/sections/Hero.tsx
  den Bildpfad anpassen. Format moeglichst 4:3, helles Motiv.
-->
<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MAGOTransport Lkw auf hellem Hintergrund">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef3fb"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="box" x1="250" y1="300" x2="250" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="cab" x1="820" y1="380" x2="1010" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="roof" x1="250" y1="300" x2="820" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dbe6fb"/>
      <stop offset="1" stop-color="#c7d8f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>

  <!-- dezente Stadtsilhouette -->
  <g fill="#1d4ed8" opacity="0.05">
    <rect x="120" y="250" width="60" height="200"/>
    <rect x="200" y="200" width="48" height="250"/>
    <rect x="270" y="290" width="70" height="160"/>
    <rect x="930" y="230" width="56" height="220"/>
    <rect x="1004" y="280" width="64" height="170"/>
  </g>

  <!-- Bodenschatten -->
  <ellipse cx="610" cy="690" rx="430" ry="34" fill="#0b1120" opacity="0.10"/>

  <!-- Anhaenger / Kofferaufbau -->
  <rect x="250" y="330" width="575" height="300" rx="14" fill="url(#box)" stroke="#d4dcea" stroke-width="2"/>
  <rect x="250" y="330" width="575" height="34" rx="14" fill="url(#roof)"/>
  <line x1="250" y1="470" x2="825" y2="470" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Wortmarke -->
  <text x="300" y="455" font-family="Geist, Arial, sans-serif" font-size="86" font-weight="800" fill="#0b1120" letter-spacing="2">MAGO</text>
  <text x="302" y="520" font-family="Geist, Arial, sans-serif" font-size="30" font-weight="700" fill="#1d4ed8" letter-spacing="10">TRANSPORT</text>

  <!-- Fahrerkabine -->
  <path d="M825 360 h120 a30 30 0 0 1 26 15 l34 70 a24 24 0 0 1 5 15 v155 a10 10 0 0 1 -10 10 h-175 a10 10 0 0 1 -10 -10 V360 Z" fill="url(#cab)"/>
  <path d="M958 388 h22 a14 14 0 0 1 12 7 l24 50 a10 10 0 0 1 -9 15 h-49 a10 10 0 0 1 -10 -10 v-52 a10 10 0 0 1 10 -10 Z" fill="#bcd2f7" opacity="0.92"/>
  <rect x="846" y="556" width="160" height="14" rx="7" fill="#0b1120" opacity="0.18"/>
  <circle cx="1000" cy="500" r="6" fill="#fde68a"/>

  <!-- Radkaesten und Reifen -->
  <g>
    <circle cx="372" cy="640" r="56" fill="#0b1120"/>
    <circle cx="372" cy="640" r="26" fill="#cbd5e1"/>
    <circle cx="372" cy="640" r="10" fill="#94a3b8"/>
    <circle cx="500" cy="640" r="56" fill="#0b1120"/>
    <circle cx="500" cy="640" r="26" fill="#cbd5e1"/>
    <circle cx="500" cy="640" r="10" fill="#94a3b8"/>
    <circle cx="912" cy="640" r="56" fill="#0b1120"/>
    <circle cx="912" cy="640" r="26" fill="#cbd5e1"/>
    <circle cx="912" cy="640" r="10" fill="#94a3b8"/>
  </g>

  <!-- Strasse -->
  <line x1="120" y1="700" x2="1080" y2="700" stroke="#cbd5e1" stroke-width="3"/>
  <g stroke="#1d4ed8" stroke-width="5" opacity="0.35" stroke-linecap="round">
    <line x1="150" y1="730" x2="210" y2="730"/>
    <line x1="270" y1="730" x2="330" y2="730"/>
    <line x1="390" y1="730" x2="450" y2="730"/>
    <line x1="510" y1="730" x2="570" y2="730"/>
  </g>

  <!-- dezente Bewegungslinien -->
  <g stroke="#1d4ed8" stroke-width="6" opacity="0.18" stroke-linecap="round">
    <line x1="150" y1="430" x2="225" y2="430"/>
    <line x1="120" y1="470" x2="215" y2="470"/>
    <line x1="160" y1="510" x2="225" y2="510"/>
  </g>
</svg>
